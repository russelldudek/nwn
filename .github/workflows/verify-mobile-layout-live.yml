name: Verify live mobile layout repair

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-mobile-layout-live.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for revised Pages deployment
        run: |
          set -euo pipefail
          base='https://russelldudek.github.io/nwn'
          ready='false'
          for attempt in $(seq 1 30); do
            home_status=$(curl -L -sS -o /tmp/home.html -w '%{http_code}' "$base/" || true)
            css_status=$(curl -L -sS -o /tmp/layout.css -w '%{http_code}' "$base/styles/readability-audit-fixes.css" || true)
            audit_status=$(curl -L -sS -o /tmp/mobile-audit.js -w '%{http_code}' "$base/scripts/mobile-layout-audit.mjs" || true)
            if [ "$home_status" = '200' ] && [ "$css_status" = '200' ] && [ "$audit_status" = '200' ] \
              && grep -q 'grid-template-rows: 116px auto auto auto' /tmp/layout.css \
              && grep -q '.kpi-table thead' /tmp/layout.css \
              && grep -q "content: 'Decision it should trigger'" /tmp/layout.css \
              && grep -q 'Airlock gate spacing passed at 390px and 320px' /tmp/mobile-audit.js; then
              ready='true'
              break
            fi
            sleep 10
          done
          test "$ready" = 'true'

          for pdf in \
            Russell-Dudek-NWN-Resume.pdf \
            Russell-Dudek-NWN-Cover-Letter.pdf \
            NWN-Interview-Thesis-Brief.pdf \
            NWN-120-Day-Entry-Plan.pdf \
            O2C-Readiness-Airlock-Worksheet.pdf; do
            status=$(curl -L -sS -o "/tmp/$pdf" -w '%{http_code}' "$base/docs/$pdf")
            test "$status" = '200'
            test "$(stat -c%s "/tmp/$pdf")" -gt 5000
          done

      - name: Record verification
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          Path('live-mobile-layout-verification.json').write_text(json.dumps({
              'url': 'https://russelldudek.github.io/nwn/',
              'httpStatus': 200,
              'gateGeometryRulesFound': True,
              'stackedMobileKpiRulesFound': True,
              'narrowViewportAuditFound': True,
              'pdfEndpointsVerified': 5,
              'verifiedAt': datetime.now(timezone.utc).isoformat(),
              'sourceCommit': os.environ['SOURCE_COMMIT']
          }, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit verification record
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-mobile-layout-verification.json
          git commit -m 'chore: record live mobile layout verification'
          git push
