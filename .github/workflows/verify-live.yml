name: Verify live candidate vision

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-live.yml'
  workflow_run:
    workflows: ['Deploy candidate vision']
    types: [completed]

permissions:
  contents: write

jobs:
  verify-live:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify public campaign
        env:
          SOURCE_COMMIT: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          url='https://russelldudek.github.io/nwn/'
          status=''
          for attempt in $(seq 1 24); do
            status=$(curl -L -sS -o /tmp/nwn-live.html -w '%{http_code}' "$url" || true)
            if [ "$status" = '200' ] && grep -q 'NWN Operations Process Excellence Director Candidate Vision' /tmp/nwn-live.html; then
              break
            fi
            sleep 10
          done
          test "$status" = '200'
          grep -q 'NWN Operations Process Excellence Director Candidate Vision' /tmp/nwn-live.html
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          Path('live-verification.json').write_text(json.dumps({
              'url': 'https://russelldudek.github.io/nwn/',
              'httpStatus': 200,
              'expectedTitleFound': True,
              'verifiedAt': datetime.now(timezone.utc).isoformat(),
              'sourceCommit': os.environ['SOURCE_COMMIT']
          }, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Commit verification record
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-verification.json
          if git diff --cached --quiet; then
            echo 'Live verification record is unchanged.'
          else
            git commit -m 'chore: record live Pages verification'
            git push
          fi
