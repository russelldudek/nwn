name: Acquire public role brief

on:
  push:
    paths:
      - .github/workflows/acquire-role.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  acquire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install browser
        run: |
          npm init -y
          npm install playwright@1.53.2
          npx playwright install --with-deps chromium
      - name: Render public posting
        env:
          JOB_URL: "https://careers-carousel.icims.com/jobs/7335/operations-process-excellence-director/job?mobile=false&width=1712&height=500&bga=true&needsRedirect=false&jan1offset=-300&jun1offset=-240"
        run: |
          cat > acquire.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1712, height: 1000 } });
          await page.goto(process.env.JOB_URL, { waitUntil: 'domcontentloaded', timeout: 120000 });
          await page.waitForTimeout(10000);

          const frameRecords = [];
          for (const frame of page.frames()) {
            let text = '';
            let html = '';
            try {
              text = await frame.locator('body').innerText({ timeout: 15000 });
              html = await frame.content();
            } catch (error) {
              text = `[frame read failed: ${error.message}]`;
            }
            frameRecords.push({ name: frame.name(), url: frame.url(), text, html });
          }

          const combined = frameRecords.map((frame, index) =>
            `===== FRAME ${index + 1} =====\nNAME: ${frame.name}\nURL: ${frame.url}\n\n${frame.text}`
          ).join('\n\n');

          fs.mkdirSync('.role-source', { recursive: true });
          fs.writeFileSync('.role-source/rendered.txt', combined);
          fs.writeFileSync('.role-source/frames.json', JSON.stringify(frameRecords.map(({name, url, text}) => ({name, url, text})), null, 2));
          fs.writeFileSync('.role-source/rendered.html', await page.content());
          await page.screenshot({ path: '.role-source/rendered.png', fullPage: true });
          await browser.close();
          JS
          node acquire.mjs
      - name: Persist rendered public role source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .role-source
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh rendered public role brief"
            git push
          fi
