name: Finalize O2C candidate campaign

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-campaign.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out campaign staging branch
        uses: actions/checkout@v4
        with:
          ref: campaign/o2c-readiness-airlock
          fetch-depth: 0

      - name: Assemble and verify staged campaign archive
        run: |
          set -euo pipefail
          cat .campaign-payload/* > /tmp/campaign.b64
          base64 --decode /tmp/campaign.b64 > /tmp/campaign.zip
          unzip -t /tmp/campaign.zip

      - name: Preserve employer-controlled public assets
        run: |
          set -euo pipefail
          mkdir -p /tmp/nwn-official
          cp assets/brand/nwn-careers-wordmark.png /tmp/nwn-official/
          cp assets/brand/official-source-02.jpg /tmp/nwn-official/nwn-hero.jpg
          cp assets/brand/official-source-06.svg /tmp/nwn-official/nwn-slant.svg

      - name: Replace staging tree with public campaign
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          unzip -q /tmp/campaign.zip -d .
          rm -f package-lock.json
          mkdir -p assets/brand
          cp /tmp/nwn-official/nwn-careers-wordmark.png assets/brand/
          cp /tmp/nwn-official/nwn-hero.jpg assets/brand/
          cp /tmp/nwn-official/nwn-slant.svg assets/brand/

      - name: Install QA dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
          python -m pip install --upgrade pip
          pip install PyMuPDF

      - name: Render and validate complete campaign
        run: |
          npm run qa:source
          npm run render
          npm run qa:all

      - name: Remove local-only QA evidence
        run: |
          rm -rf node_modules qa

      - name: Commit clean public campaign
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: build O2C readiness candidate campaign"
          git push origin HEAD:campaign/o2c-readiness-airlock

      - name: Upload build evidence
        uses: actions/upload-artifact@v4
        with:
          name: finalized-campaign-evidence
          path: |
            docs/*.pdf
            artifact-manifest.json
          retention-days: 7
