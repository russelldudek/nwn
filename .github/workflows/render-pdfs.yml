name: Render and publish campaign PDFs

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/render-pdfs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '*.html'
      - '*.css'
      - 'app.js'
      - 'assets/brand/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: pip install PyMuPDF
      - run: npm run qa:source
      - run: npm run render
      - run: npm run qa:all
      - name: Commit verified PDFs
        run: |
          set -euo pipefail
          rm -rf qa
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs artifact-manifest.json
          if git diff --cached --quiet; then
            echo "Verified PDFs already match the current sources."
          else
            git commit -m "build: publish verified campaign PDFs"
            git push
          fi
