name: Materialize candidate campaign

on:
  push:
    branches:
      - campaign/o2c-readiness-airlock
    paths:
      - .github/workflows/materialize-campaign.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assemble and verify campaign archive
        run: |
          set -euo pipefail
          cat .campaign-payload/* > /tmp/campaign.b64
          base64 --decode /tmp/campaign.b64 > /tmp/campaign.zip
          unzip -t /tmp/campaign.zip
      - name: Preserve official employer assets
        run: |
          set -euo pipefail
          mkdir -p /tmp/nwn-official
          cp assets/brand/nwn-careers-wordmark.png /tmp/nwn-official/
          cp assets/brand/official-source-02.jpg /tmp/nwn-official/nwn-hero.jpg
          cp assets/brand/official-source-06.svg /tmp/nwn-official/nwn-slant.svg
      - name: Replace temporary tree with public campaign
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          unzip -q /tmp/campaign.zip -d .
          mkdir -p assets/brand
          cp /tmp/nwn-official/nwn-careers-wordmark.png assets/brand/
          cp /tmp/nwn-official/nwn-hero.jpg assets/brand/
          cp /tmp/nwn-official/nwn-slant.svg assets/brand/
      - name: Commit clean campaign tree
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: build O2C readiness candidate campaign"
          git push origin HEAD:campaign/o2c-readiness-airlock
